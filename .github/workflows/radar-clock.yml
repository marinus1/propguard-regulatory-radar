name: PropGuard Compliance Radar Loop

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Pull code from storage
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install scrapers
        run: pip install requests beautifulsoup4

      - name: Execute PropGuard Radar Script
        run: python agent.py
