name: Continuous Regulatory Intelligence Agent

on:
  schedule:
    - cron: '0 6 * * *' # Runs fully automated every single morning at 6:00 AM UTC
  workflow_dispatch: # Allows you to manually click a button to test run it whenever you want

jobs:
  run-compliance-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 gspread google-oauth2 google-generativeai

      - name: Execute Live Compliance Radar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python agent.py
