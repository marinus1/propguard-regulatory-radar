name: PropGuard Compliance Radar Loop

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Pull code from storage
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install scrapers
        run: pip install requests beautifulsoup4

      - name: Execute PropGuard Radar Script
        id: run_script
        run: |
          # Run the script and save the full output to a text file
          python agent.py > radar_output.txt
          cat radar_output.txt
          
          # Check if the output contains any found updates
          if grep -q "Found [1-9][0-9]* potential" radar_output.txt; then
            echo "updates_found=true" >> $GITHUB_ENV
          else
            echo "updates_found=false" >> $GITHUB_ENV
          }

      - name: Send Email Alert if Updates Found
        if: env.updates_found == 'true'
        run: |
          echo "Radar alert triggered! Check your GitHub Actions logs to see the live regulatory updates."
          exit 1 # This forces GitHub to mark the run as 'Failed' (Red), which triggers an instant email alert to your inbox!
